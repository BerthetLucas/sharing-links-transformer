name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test E2E
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with: 
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Build app
        run: pnpm run build

      - name: Start app
        run: |
          pnpm run start &
          for i in {1..30}; do
            if curl --silent --fail http://localhost:3000 > /dev/null 2>&1; then
              echo "App is running"
              exit 0
            fi
            echo "Waiting for app to start... ($i/30)"
            sleep 2
          done
          echo "Failed to start app"
          exit 1
        env:
          CLIENT_ID: ${{secrets.CLIENT_ID}}
          CLIENT_SECRET: ${{secrets.CLIENT_SECRET}}

      - name: Run Playwright tests
        id: end-to-end-tests
        run: pnpm exec playwright test
        env:
          CLIENT_ID: ${{secrets.CLIENT_ID}}
          CLIENT_SECRET: ${{secrets.CLIENT_SECRET}}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Discord - e2e failed
        if: failure() && steps.end-to-end-tests.outcome == 'failure'
        run: |
          REF="${{ github.head_ref || github.ref_name }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LINK="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
            CONTEXT="PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
          else
            LINK="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
            CONTEXT="Push sur \`$REF\` par ${{ github.actor }}"
          fi
          PAYLOAD=$(jq -n \
            --arg context "$CONTEXT" \
            --arg link "$LINK" \
            --arg run "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{embeds: [{
              title: "Tests E2E en echec",
              type: "rich",
              color: 15158332,
              thumbnail: {
              "url": "https://www.creativefabrica.com/wp-content/uploads/2023/07/29/Atomic-bomb-explosion-Cartoon-fire-blas-Graphics-75689251-1.png"
            },
              fields: [
                {name: "Contexte", value: $context},
                {name: "Lien", value: $link},
                {name: "Rapport", value: $run}
              ]
            }]}')
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}